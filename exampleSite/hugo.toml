[params]
  header_image = "img/hero-ia-data.png"
  sidebar_avatar = "img/yves-boutherand.jpg"
  articles_par_page = 6


[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "JSON"]

  [markup]
  [markup.goldmark.renderer]
    unsafe = true 
  [markup.highlight]
    style = "dracula"

[frontmatter]
  lastmod = [":fileModTime", "lastmod", ":git", "date"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

  enableRobotsTXT = true

